name: Daily VŽ Summary

on:
  schedule:
    # 04:30 UTC = 07:30 EEST (summer) / 06:30 EET (winter) Vilnius time
    - cron: '30 4 * * *'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write  # needed to commit updated state/last_run.json back

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run summary pipeline
        env:
          VZ_EMAIL: ${{ secrets.VZ_EMAIL }}
          VZ_PASSWORD: ${{ secrets.VZ_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          PYTHONIOENCODING: utf-8
        run: python main.py

      - name: Commit updated state
        if: success()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add state/last_run.json
          if git diff --quiet --cached; then
            echo "No state change to commit."
          else
            git commit -m "Update last_run state [skip ci]"
            git push
          fi
